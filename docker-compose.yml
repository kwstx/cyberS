version: '3.8'

services:
  # Stateful Graph Store
  neo4j:
    image: neo4j:5.12.0
    container_name: darip-graph-db
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Layer 5: Governance Service (Zero-Trust & Policy Engine)
  governance:
    build:
      context: .
      dockerfile: Dockerfile.gov
    container_name: darip-governance
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    depends_on:
      - neo4j

  # Layer 2: Semantic Fusion Service (Aggregates signals, updates Graph)
  semantic_fusion:
    build:
      context: .
      dockerfile: Dockerfile.fusion
    container_name: darip-semantic-fusion
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - GOVERNANCE_URL=http://governance:8001
    depends_on:
      - neo4j
      - governance

  # Layer 1: Data Ingestion Service (Parses multi-signals: SBOM, ratings, telemetry)
  data_ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingest
    container_name: darip-data-ingestion
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - GOVERNANCE_URL=http://governance:8001
      - FUSION_URL=http://semantic_fusion:8002
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - governance
      - semantic_fusion
      - kafka

  # Layer 3: Predictive Inference Service (Stateless AI prediction pods)
  predictive_inference:
    build:
      context: .
      dockerfile: Dockerfile.inference
    container_name: darip-predictive-inference
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - GOVERNANCE_URL=http://governance:8001
      - FUSION_URL=http://semantic_fusion:8002
    depends_on:
      - governance
      - semantic_fusion

  # Layer 4: Agentic Execution Service (Orchestrates autonomous agents)
  agentic_execution:
    build:
      context: .
      dockerfile: Dockerfile.agentic
    container_name: darip-agentic-execution
    ports:
      - "8004:8004"
    environment:
      - PORT=8004
      - GOVERNANCE_URL=http://governance:8001
      - FUSION_URL=http://semantic_fusion:8002
      - INFERENCE_URL=http://predictive_inference:8003
    depends_on:
      - governance
      - semantic_fusion
      - predictive_inference

  # Kafka Message Broker (KRaft mode)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: darip-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  # Connectors Service
  connectors:
    build:
      context: .
      dockerfile: connectors/Dockerfile.connectors
    container_name: darip-connectors
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka

  # Layer 2b: Spark Streaming Service for CEP & ML Anomaly Detection
  spark_streaming:
    build:
      context: .
      dockerfile: Dockerfile.spark
    container_name: darip-spark-streaming
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
      - semantic_fusion

volumes:
  neo4j_data:
  neo4j_logs:

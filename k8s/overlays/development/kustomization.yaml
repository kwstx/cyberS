apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

# Generate environment-specific config map
configMapGenerator:
- name: darip-config
  namespace: darip
  behavior: create
  literals:
  - ENVIRONMENT=development
  - LOG_LEVEL=DEBUG
  - KAFKA_BOOTSTRAP_SERVERS=kafka-dev-service:9092
  - NEO4J_URI=bolt://neo4j-service:7687
  - GOVERNANCE_URL=http://governance-service:8001
  - FUSION_URL=http://semantic-fusion-service:8002

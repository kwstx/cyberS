apiVersion: apps/v1
kind: Deployment
metadata:
  name: darip-api
  namespace: darip
  labels:
    app: darip-api
    layer: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: darip-api
  template:
    metadata:
      labels:
        app: darip-api
        layer: api
    spec:
      containers:
      - name: darip-api
        image: darip:latest
        imagePullPolicy: IfNotPresent
        command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: darip-config
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: darip-api-svc
  namespace: darip
spec:
  selector:
    app: darip-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP

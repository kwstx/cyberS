apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: semantic-fusion-hpa
  namespace: darip
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: darip-semantic-fusion
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: darip-data-ingestion-sa
  namespace: darip
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: darip-semantic-fusion-sa
  namespace: darip
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: darip-predictive-inference-sa
  namespace: darip
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: darip-agentic-execution-sa
  namespace: darip
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: darip-governance-sa
  namespace: darip
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: darip-graph-db
  namespace: darip
spec:
  serviceName: "neo4j-service"
  replicas: 1
  selector:
    matchLabels:
      app: darip-graph-db
  template:
    metadata:
      labels:
        app: darip-graph-db
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.12.0
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        env:
        - name: NEO4J_AUTH
          value: "neo4j/password"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1024Mi
        volumeMounts:
        - name: neo4j-storage
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: neo4j-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: darip
spec:
  ports:
  - port: 7474
    targetPort: 7474
    name: http
  - port: 7687
    targetPort: 7687
    name: bolt
  selector:
    app: darip-graph-db
---
# stateless Layer 1: Ingestion
apiVersion: apps/v1
kind: Deployment
metadata:
  name: darip-data-ingestion
  namespace: darip
spec:
  replicas: 1
  selector:
    matchLabels:
      app: darip-data-ingestion
  template:
    metadata:
      labels:
        app: darip-data-ingestion
    spec:
      serviceAccountName: darip-data-ingestion-sa
      containers:
      - name: data-ingestion
        image: darip/data-ingestion:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: data-ingestion-service
  namespace: darip
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: darip-data-ingestion
---
